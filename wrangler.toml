name = "pkg"
main = "src/index.ts"
compatibility_date = "2026-01-20"

# Environment variables (set via wrangler secret)
# GPG_PRIVATE_KEY - ASCII armored private key for signing
# GITHUB_TOKEN - GitHub PAT for API rate limits (optional but recommended)

[vars]
# Default cache TTL in seconds (24 hours)
CACHE_TTL = "86400"
# Restrict to NetwindHQ repos only (comma-separated, case-insensitive)
ALLOWED_OWNERS = "NetwindHQ"

[limits]
cpu_ms = 1000
subrequests = 1000

[placement]
mode = "smart"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
